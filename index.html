<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>廃人サバメンバーキャラ武器所持状況チェック</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p class="loading-text">読み込み中...</p>
  </div>

  <div id="app">

    <!-- =============== HOME VIEW =============== -->
    <div id="homeView">
      <header class="site-header">
        <h1>廃人サバメンバー<br>キャラ武器所持状況チェック</h1>
      </header>
      <main class="home-main">
        <div id="memberList" class="member-list"></div>
        <button id="addMemberBtn" class="btn btn-primary add-member-btn">＋ メンバーを追加</button>
      </main>
    </div>

    <!-- =============== MEMBER VIEW =============== -->
    <div id="memberView" class="hidden">
      <header class="member-header">
        <button id="backBtn" class="btn btn-back">← 一覧へ</button>
        <h2 id="memberViewTitle" class="member-view-title"></h2>
      </header>

      <nav class="tab-bar">
        <button class="tab-btn active" id="tabBtnChar">キャラクター</button>
        <button class="tab-btn" id="tabBtnWeapon">武器</button>
      </nav>

      <!-- === Char Tab === -->
      <div id="charTab" class="tab-pane">
        <div class="filter-section">
          <div class="filter-grid">
            <div class="filter-item">
              <label class="filter-label">所持</label>
              <select id="charFilterOwned" class="filter-select">
                <option value="">全て</option>
                <option value="owned">所持のみ</option>
                <option value="notOwned">未所持のみ</option>
              </select>
            </div>
            <div class="filter-item">
              <label class="filter-label">元素</label>
              <select id="charFilterElement" class="filter-select">
                <option value="">全て</option>
                <option value="炎">炎</option>
                <option value="水">水</option>
                <option value="風">風</option>
                <option value="雷">雷</option>
                <option value="草">草</option>
                <option value="氷">氷</option>
                <option value="岩">岩</option>
                <option value="その他">その他</option>
              </select>
            </div>
            <div class="filter-item">
              <label class="filter-label">武器種</label>
              <select id="charFilterWeaponType" class="filter-select">
                <option value="">全て</option>
                <option value="片手剣">片手剣</option>
                <option value="両手剣">両手剣</option>
                <option value="長柄武器">長柄武器</option>
                <option value="弓">弓</option>
                <option value="法器">法器</option>
              </select>
            </div>
            <div class="filter-item">
              <label class="filter-label">凸数</label>
              <select id="charFilterConst" class="filter-select">
                <option value="">全て</option>
                <option value="none">未所持</option>
                <option value="0">無凸</option>
                <option value="1">1凸</option>
                <option value="2">2凸</option>
                <option value="3">3凸</option>
                <option value="4">4凸</option>
                <option value="5">5凸</option>
                <option value="6">6凸</option>
              </select>
            </div>
            <div class="filter-item">
              <label class="filter-label">並び順</label>
              <select id="charSort" class="filter-select">
                <option value="default">デフォルト</option>
                <option value="constDesc">凸数 高い順</option>
                <option value="constAsc">凸数 低い順</option>
              </select>
            </div>
          </div>
        </div>
        <div id="charList" class="item-grid"></div>
      </div>

      <!-- === Weapon Tab === -->
      <div id="weaponTab" class="tab-pane hidden">
        <div class="filter-section">
          <div class="filter-grid">
            <div class="filter-item">
              <label class="filter-label">所持</label>
              <select id="weaponFilterOwned" class="filter-select">
                <option value="">全て</option>
                <option value="owned">所持のみ</option>
                <option value="notOwned">未所持のみ</option>
              </select>
            </div>
            <div class="filter-item">
              <label class="filter-label">武器種</label>
              <select id="weaponFilterType" class="filter-select">
                <option value="">全て</option>
                <option value="片手剣">片手剣</option>
                <option value="両手剣">両手剣</option>
                <option value="長柄武器">長柄武器</option>
                <option value="弓">弓</option>
                <option value="法器">法器</option>
              </select>
            </div>
            <div class="filter-item">
              <label class="filter-label">レアリティ</label>
              <select id="weaponFilterRarity" class="filter-select">
                <option value="">全て(★4以上)</option>
                <option value="5">★5のみ</option>
                <option value="4">★4のみ</option>
              </select>
            </div>
            <div class="filter-item">
              <label class="filter-label">精錬</label>
              <select id="weaponFilterRef" class="filter-select">
                <option value="">全て</option>
                <option value="none">未所持</option>
                <option value="1">精錬1</option>
                <option value="2">精錬2</option>
                <option value="3">精錬3</option>
                <option value="4">精錬4</option>
                <option value="5">精錬5</option>
              </select>
            </div>
            <div class="filter-item">
              <label class="filter-label">並び順</label>
              <select id="weaponSort" class="filter-select">
                <option value="default">デフォルト</option>
                <option value="refDesc">精錬数 高い順</option>
                <option value="refAsc">精錬数 低い順</option>
              </select>
            </div>
          </div>
        </div>
        <div id="weaponList" class="item-grid"></div>
      </div>

    </div><!-- /memberView -->
  </div><!-- /app -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js" onerror="window._configMissing = true"></script>
  <script src="script.js"></script>
</body>
</html>
